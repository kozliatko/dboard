services:
  # Read-only Docker API proxy. dboard never touches /var/run/docker.sock
  # directly — it talks to this proxy over TCP, which only forwards
  # whitelisted GET endpoints (containers + version). All writes (POST) are
  # blocked, so even a fully compromised dboard cannot create/modify
  # containers or escape to the host via the Docker API.
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    restart: unless-stopped
    environment:
      CONTAINERS: 1      # GET /containers/json, /containers/{id}/json, /stats
      NETWORKS: 1        # GET /networks — needed for network topology panel
      VERSION: 1         # GET /version — needed for SDK API negotiation
      POST: 0            # block every write operation
      # everything else stays disabled (default 0)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - default
    # The security boundary here is the API whitelist (POST=0, only GET
    # containers/version). The entrypoint rewrites its own haproxy.cfg, so the
    # rootfs can't be read-only; no-new-privileges still blocks escalation.
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2375"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  dboard:
    image: ghcr.io/kozliatko/dboard:latest
    restart: unless-stopped
    depends_on:
      socket-proxy:
        condition: service_healthy
    networks:
      - default
      - caddy
    env_file:
      - .env
    environment:
      # These override anything in .env — infrastructure vars with fixed defaults.
      DOCKER_HOST: tcp://socket-proxy:2375
      NO_PROXY: "socket-proxy,localhost,127.0.0.1"
      no_proxy: "socket-proxy,localhost,127.0.0.1"
    volumes:
      # Narrow host mounts for disk stats only — NOT the whole root filesystem.
      # /etc, /root, /home and SSH keys are never exposed to the container.
      - /opt/dboard/diskprobe:/host/root:ro   # empty dir on the root (/) fs → statvfs gives / usage
      - /boot:/host/boot:ro                   # /boot filesystem usage
      - dboard_data:/app/data                 # SQLite metrics history (writable)
    tmpfs:
      - /tmp
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    labels:
      caddy: dboard.kozliatko.sk
      caddy.reverse_proxy: "{{upstreams 8000}}"
      caddy.encode: gzip zstd
      # HTTP Basic Auth. Generate a hash with:
      #   docker exec caddy caddy hash-password --plaintext '<your-password>'
      # '$' must be doubled to '$$' inside compose. Default user: admin.
      caddy.basic_auth.admin: "$$2a$$14$$XXvoODukWeOxyaG18xgY7ezbMrYPcDQN2.6Cndn8BzlBI1Z8cW1g2"

networks:
  caddy:
    external: true

volumes:
  dboard_data:
