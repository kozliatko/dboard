<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dboard</title>
  <link rel="icon" href="/static/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/static/icon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <link rel="manifest" href="/static/site.webmanifest">
  <meta name="theme-color" content="#0d0e1a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/tailwind.css">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: #07080f;
      min-height: 100svh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(139,92,246,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139,92,246,.03) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    .page { position: relative; z-index: 1; }

    .mono { font-family: 'JetBrains Mono', monospace; }

    /* Table */
    .tbl-wrap {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid #1c1d30;
      background: #0d0e1a;
    }

    .tbl { width: 100%; border-collapse: collapse; }

    .tbl th {
      font-size: .6rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #4b5563;
      text-align: left;
      padding: .6rem .9rem;
      white-space: nowrap;
      border-bottom: 1px solid #1c1d30;
    }

    .tbl th.sortable {
      cursor: pointer;
      user-select: none;
      transition: color .15s;
    }
    .tbl th.sortable:hover { color: #9ca3af; }
    .tbl th.th-active { color: #a78bfa; }
    .sort-icon { display: inline-block; width: .9em; opacity: .5; }
    .tbl th.th-active .sort-icon { opacity: 1; }

    .tbl td {
      padding: .65rem .9rem;
      vertical-align: middle;
      border-bottom: 1px solid #111220;
      white-space: nowrap;
    }

    .tbl tbody tr:last-child td { border-bottom: none; }
    .tbl tbody tr:hover td { background: rgba(139,92,246,.04); }

    /* Status badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: .68rem;
      font-weight: 500;
      padding: .2em .55em;
      border-radius: 5px;
      white-space: nowrap;
    }
    .badge-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

    .badge-running    { background:#0d2b1a; color:#4ade80; border:1px solid #166534; }
    .badge-running .badge-dot { background:#4ade80; box-shadow:0 0 5px #4ade8099; }
    .badge-exited     { background:#2b0d0d; color:#f87171; border:1px solid #991b1b; }
    .badge-exited .badge-dot { background:#f87171; }
    .badge-paused     { background:#2b250d; color:#fbbf24; border:1px solid #92400e; }
    .badge-paused .badge-dot { background:#fbbf24; }
    .badge-restarting { background:#0d1a2b; color:#60a5fa; border:1px solid #1d4ed8; }
    .badge-restarting .badge-dot { background:#60a5fa; }
    .badge-dead       { background:#1a1a1a; color:#6b7280; border:1px solid #374151; }
    .badge-dead .badge-dot { background:#4b5563; }

    /* Health */
    .h-healthy   { color:#4ade80; }
    .h-unhealthy { color:#f87171; }
    .h-starting  { color:#fbbf24; }

    /* Domain chip */
    .chip {
      font-family: 'JetBrains Mono', monospace;
      font-size: .65rem;
      padding: .15em .45em;
      border-radius: 4px;
      background: #12103a;
      color: #a78bfa;
      border: 1px solid #2e2b60;
      display: inline-block;
      text-decoration: none;
      transition: color .15s, border-color .15s;
      margin-right: .25rem;
    }
    .chip:hover { color:#c4b5fd; border-color:#4c3fb5; }

    /* Stat cell */
    .stat-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: .78rem;
      font-weight: 500;
      line-height: 1;
    }
    .stat-bar-wrap {
      height: 2px;
      background: #1a1b2e;
      border-radius: 1px;
      margin-top: 4px;
      width: 56px;
    }
    .stat-bar-fill { height: 2px; border-radius: 1px; transition: width .7s; }

    /* Section bar */
    .section-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: .6rem;
      flex-wrap: wrap;
    }
    .section-title {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #4b5563;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .section-title span {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
      color: #374151;
      font-size: .65rem;
    }

    /* Filter input */
    .filter-input {
      background: #13142a;
      border: 1px solid #2e3055;
      border-radius: 7px;
      color: #e2e8f0;
      font-family: 'JetBrains Mono', monospace;
      font-size: .72rem;
      padding: .35rem .75rem;
      outline: none;
      width: 200px;
      transition: border-color .2s, box-shadow .2s, width .2s;
    }
    .filter-input:focus {
      border-color: #6d4fc4;
      box-shadow: 0 0 0 2px rgba(109,79,196,.2);
      width: 260px;
    }
    .filter-input::placeholder { color: #3d4068; }
    @media (max-width: 480px) {
      .filter-input, .filter-input:focus { width: 100%; }
      .section-bar { flex-direction: column; align-items: flex-start; }
    }

    /* Empty row */
    .empty-row td {
      text-align: center;
      padding: 2rem;
      color: #374151;
      font-size: .8rem;
      font-style: italic;
    }

    /* Skeleton */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .pulse { animation: pulse 1.8s ease-in-out infinite; }

    /* System stats panel */
    .sys-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: .65rem;
      margin-bottom: 2rem;
    }
    .sys-card {
      background: #0d0e1a;
      border: 1px solid #1c1d30;
      border-radius: 10px;
      padding: .75rem .9rem;
      cursor: pointer;
      transition: border-color .15s;
    }
    .sys-card:hover { border-color: #2e2b60; }
    .sys-card-label {
      font-size: .58rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #4b5563;
      margin-bottom: .4rem;
    }
    .sys-card-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.35rem;
      font-weight: 500;
      line-height: 1;
      margin-bottom: .35rem;
    }
    .sys-card-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: .62rem;
      color: #4b5563;
      margin-top: .3rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sys-bar-wrap {
      height: 3px;
      background: #1a1b2e;
      border-radius: 2px;
      margin: .4rem 0 .25rem;
    }
    .sys-bar-fill { height: 3px; border-radius: 2px; transition: width .8s; }

    /* Threshold levels */
    @keyframes crit-pulse {
      0%,100% { box-shadow: 0 0 0 1px #991b1b30; }
      50%      { box-shadow: 0 0 14px #ef444448; }
    }
    .sys-card.warn { border-color: #92400e; }
    .sys-card.crit { border-color: #7f1d1d; animation: crit-pulse 2.5s ease-in-out infinite; }

    /* Row thresholds */
    .tbl tbody tr.row-warn td:first-child { box-shadow: inset 2px 0 0 #92400e; }
    .tbl tbody tr.row-crit td:first-child { box-shadow: inset 2px 0 0 #991b1b; }
    .tbl tbody tr.row-crit td { background: rgba(239,68,68,.025); }

    /* Network grid */
    .net-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: .75rem; }
    .net-card {
      background: #0d0e1a; border: 1px solid #1e1b4b; border-radius: .5rem;
      padding: .85rem 1rem; display: flex; flex-direction: column; gap: .45rem;
    }
    .net-card-name { font-size: .85rem; font-weight: 600; color: #e2e8f0; word-break: break-all; }
    .net-badges { display: flex; flex-wrap: wrap; gap: .3rem; }
    .net-badge {
      font-size: .65rem; font-weight: 600; padding: .1rem .45rem;
      border-radius: 9999px; letter-spacing: .02em; text-transform: uppercase;
    }
    .net-badge-bridge  { background: #1e3a5f; color: #60a5fa; }
    .net-badge-host    { background: #3b2200; color: #fb923c; }
    .net-badge-overlay { background: #2e1a5e; color: #a78bfa; }
    .net-badge-macvlan { background: #14532d; color: #4ade80; }
    .net-badge-null    { background: #1f2937; color: #6b7280; }
    .net-badge-other   { background: #1e293b; color: #94a3b8; }
    .net-badge-internal{ background: #1c1917; color: #a8a29e; }
    .net-badge-swarm   { background: #172554; color: #93c5fd; }
    .net-count { font-size: .78rem; color: #6b7280; }
    .net-count strong { color: #c4b5fd; }
    .net-containers { display: flex; flex-wrap: wrap; gap: .25rem; margin-top: .1rem; }
    .net-ctag {
      font-size: .65rem; background: #12131e; border: 1px solid #2a2650;
      border-radius: .25rem; padding: .05rem .35rem; color: #94a3b8;
    }

    /* Token cards */
    .tok-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: .65rem;
    }
    .tok-card {
      background: #0d0e1a;
      border: 1px solid #1c1d30;
      border-radius: 10px;
      padding: .75rem .9rem;
      border-left: 3px solid #1c1d30;
      transition: border-color .2s;
    }
    .tok-card.valid   { border-left-color: #166534; }
    .tok-card.invalid { border-left-color: #991b1b; }
    .tok-card.unconfigured { opacity: .45; }
    .tok-name {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: .4rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .tok-status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tok-status-dot.valid   { background: #4ade80; box-shadow: 0 0 6px #4ade8088; }
    .tok-status-dot.invalid { background: #f87171; }
    .tok-status-dot.unconfigured { background: #374151; }
    .tok-hint {
      font-family: 'JetBrains Mono', monospace;
      font-size: .68rem;
      color: #4b5563;
      margin-bottom: .3rem;
    }
    .tok-detail {
      font-size: .72rem;
      color: #6b7280;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tok-detail.valid { color: #86efac; }
    .tok-detail.invalid { color: #fca5a5; }
    .tok-extras {
      margin-top: .5rem;
      border-top: 1px solid #1c1d30;
      padding-top: .45rem;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: .15rem .6rem;
    }
    .tok-extra-label {
      font-size: .6rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #374151;
      white-space: nowrap;
      padding-top: .05rem;
    }
    .tok-extra-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: .65rem;
      color: #6b7280;
      word-break: break-all;
    }
    .tok-checked {
      font-family: 'JetBrains Mono', monospace;
      font-size: .58rem;
      color: #374151;
      margin-top: .4rem;
    }
    .refresh-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: .65rem;
      color: #4b5563;
      background: none;
      border: 1px solid #1c1d30;
      border-radius: 5px;
      padding: .2em .6em;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .refresh-btn:hover { color: #a78bfa; border-color: #4c3fb5; }
    .refresh-btn:disabled { opacity: .4; cursor: default; }

    /* Tab bar */
    .tab-bar {
      display: flex;
      gap: .1rem;
      border-bottom: 1px solid #1c1d30;
      margin-bottom: 1.75rem;
    }
    .tab-btn {
      font-family: 'Outfit', sans-serif;
      font-size: .78rem;
      font-weight: 600;
      color: #4b5563;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: .55rem 1.1rem;
      cursor: pointer;
      transition: color .15s, border-color .15s;
      margin-bottom: -1px;
      letter-spacing: .03em;
      display: flex;
      align-items: center;
      gap: .45rem;
      white-space: nowrap;
    }
    .tab-btn:hover { color: #9ca3af; }
    .tab-btn.active { color: #a78bfa; border-bottom-color: #a78bfa; }

    .tab-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: .6rem;
      font-weight: 400;
      color: #374151;
      background: #13142a;
      border: 1px solid #1c1d30;
      border-radius: 4px;
      padding: .05em .4em;
      transition: color .2s;
    }
    .tab-btn.active .tab-badge { color: #6d5ea8; border-color: #2e2b60; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Global stacked resource chart ────────────────────────────────────── */
    .stack-panel { position:relative; background:#0d0e1a; border:1px solid #1c1d30; border-radius:14px; padding:1rem 1.1rem 1.1rem; }
    .stack-chart { position:relative; }
    .stack-guide { position:absolute; width:1px; background:#ffffff30; pointer-events:none; display:none; z-index:10; }
    .stack-tip {
      position:absolute; pointer-events:none; z-index:20; display:none;
      background:#16172a; border:1px solid #2e2b60; border-radius:.5rem; padding:.4rem .6rem;
      font-family:'JetBrains Mono',monospace; font-size:.66rem; color:#e5e7eb; white-space:nowrap;
      box-shadow:0 8px 24px -8px rgba(0,0,0,.7); transform:translate(-50%, calc(-100% - 12px));
    }
    .stack-tip .tip-name { display:flex; align-items:center; gap:.4rem; font-weight:500; }
    .stack-tip .tip-dot { width:.55rem; height:.55rem; border-radius:2px; }
    .stack-tip .tip-sub { color:#9aa1b2; margin-top:.18rem; }
    .stack-head { display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap; margin-bottom:.8rem; }
    .stack-title { font-size:.78rem; font-weight:600; color:#cbd5e1; letter-spacing:.01em; }
    .stack-title span { font-family:'JetBrains Mono',monospace; font-size:.72rem; color:#9aa1b2; margin-left:.4rem; }
    .stack-controls { display:flex; gap:.55rem; flex-wrap:wrap; }
    .seg { display:inline-flex; gap:2px; padding:3px; background:#0c0d17; border:1px solid #1c1d30; border-radius:.55rem; }
    .seg-btn {
      font-family:'JetBrains Mono',monospace; font-size:.64rem; color:#9aa1b2;
      padding:.26rem .6rem; border:0; border-radius:.38rem; background:transparent; cursor:pointer; transition:all .14s;
    }
    .seg-btn:hover { color:#e5e7eb; background:#16172a; }
    .seg-btn.active { color:#0c0d17; background:#a78bfa; font-weight:500; }
    .stack-chart { width:100%; }
    .stack-legend { display:flex; flex-wrap:wrap; gap:.35rem .9rem; margin-top:.7rem; }
    .stack-leg-item { display:inline-flex; align-items:center; gap:.35rem; font-family:'JetBrains Mono',monospace; font-size:.62rem; color:#9aa1b2; }
    .stack-leg-dot { width:.6rem; height:.6rem; border-radius:2px; flex-shrink:0; }
    .stack-axis { display:flex; justify-content:space-between; margin-top:5px; font-family:'JetBrains Mono',monospace; font-size:.6rem; color:#9aa1b2; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2e2e50; border-radius: 3px; }

    /* ── Container detail overlay ─────────────────────────────────────────── */
    .row-click { cursor: pointer; }
    .overlay {
      position: fixed; inset: 0; z-index: 50;
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
      background: rgba(6,7,14,.72);
      backdrop-filter: blur(7px); -webkit-backdrop-filter: blur(7px);
      opacity: 0; pointer-events: none;
      transition: opacity .18s ease;
    }
    .overlay.open { opacity: 1; pointer-events: auto; }
    .overlay-panel {
      width: 100%; max-width: 720px; max-height: 88vh; overflow-y: auto;
      background: linear-gradient(180deg,#15162a,#0c0d17);
      border: 1px solid #2a2b45; border-radius: 1.1rem;
      box-shadow: 0 30px 80px -20px rgba(0,0,0,.85), 0 0 0 1px rgba(167,139,250,.05);
      padding: 1.5rem 1.6rem 1.7rem;
      transform: translateY(12px) scale(.985);
      transition: transform .2s cubic-bezier(.2,.8,.2,1);
    }
    .overlay.open .overlay-panel { transform: none; }

    .ov-head { display:flex; align-items:flex-start; justify-content:space-between; gap:1rem; }
    .ov-title { display:flex; align-items:center; gap:.6rem; }
    .ov-title h2 { font-size:1.3rem; font-weight:700; color:#fff; letter-spacing:-.01em; }
    .ov-dot { width:.6rem; height:.6rem; border-radius:50%; flex-shrink:0; }
    .ov-sub {
      font-family:'JetBrains Mono',monospace; font-size:.72rem; color:#6b7280;
      margin-top:.45rem; display:flex; flex-wrap:wrap; gap:.35rem .5rem; align-items:center;
    }
    .ov-close {
      flex-shrink:0; width:2rem; height:2rem; border-radius:.6rem;
      border:1px solid #23243a; background:#0d0e1a; color:#9ca3af;
      font-size:1.15rem; line-height:1; cursor:pointer; transition:all .15s;
    }
    .ov-close:hover { color:#fff; border-color:#3a3b5a; background:#16172a; }
    .ov-chips { display:flex; flex-wrap:wrap; gap:.4rem; margin-top:.7rem; }

    .ov-ranges { display:inline-flex; gap:2px; margin-top:1.2rem; padding:3px;
      background:#0c0d17; border:1px solid #1c1d30; border-radius:.6rem; }
    .ov-range-btn {
      font-family:'JetBrains Mono',monospace; font-size:.66rem; color:#9aa1b2;
      padding:.28rem .7rem; border:0; border-radius:.42rem; background:transparent;
      cursor:pointer; transition:all .14s;
    }
    .ov-range-btn:hover { color:#e5e7eb; background:#16172a; }
    .ov-range-btn.active { color:#0c0d17; background:#a78bfa; font-weight:500; }

    .ov-metrics { display:grid; grid-template-columns:1fr 1fr; gap:.8rem; margin-top:1.35rem; }
    .ov-metric {
      background:#0c0d17; border:1px solid #1c1d30; border-radius:.85rem;
      padding:.85rem .95rem .75rem;
    }
    .ov-metric.span2 { grid-column:1 / -1; }
    .ov-metric.warn { border-color:#92400e; }
    .ov-metric.crit { border-color:#7f1d1d; }
    .ov-metric-label {
      font-family:'JetBrains Mono',monospace; font-size:.6rem; text-transform:uppercase;
      letter-spacing:.09em; color:#9ca3af;
    }
    .ov-metric-val {
      font-family:'JetBrains Mono',monospace; font-size:1.55rem; font-weight:600;
      margin-top:.15rem; line-height:1.1; color:#e5e7eb;
    }
    .ov-metric-val small { font-size:.78rem; color:#6b7280; font-weight:400; }
    .ov-chart { margin-top:.55rem; }
    .ov-chart-wrap { }
    .ov-axis {
      display:flex; justify-content:space-between; margin-top:5px;
      font-family:'JetBrains Mono',monospace; font-size:.62rem; color:#9aa1b2;
    }
    .ov-net { display:flex; gap:1.6rem; font-family:'JetBrains Mono',monospace; font-size:1.1rem; margin-top:.2rem; }
    .ov-legend { display:flex; gap:.7rem; font-family:'JetBrains Mono',monospace; font-size:.62rem; }
    .ov-net-total { font-size:.66rem; color:#7d8494; margin-top:.5rem; }

    .ov-details { margin-top:1.25rem; display:grid; grid-template-columns:repeat(2,1fr); gap:.6rem .9rem; }
    .ov-detail-k {
      font-family:'JetBrains Mono',monospace; font-size:.6rem; text-transform:uppercase;
      letter-spacing:.06em; color:#4b5563;
    }
    .ov-detail-v { font-family:'JetBrains Mono',monospace; font-size:.78rem; color:#cbd5e1; word-break:break-all; margin-top:.1rem; }

    @media (max-width:560px) {
      .ov-metrics { grid-template-columns:1fr; }
      .ov-details { grid-template-columns:1fr; }
    }
  </style>
</head>
<body class="text-gray-300">

<div class="page max-w-6xl mx-auto px-4 pt-6 pb-14 sm:px-6">

  <!-- Header -->
  <header class="mb-8 flex items-start justify-between gap-4">
    <div>
      <div class="flex items-center gap-2.5 mb-1">
        <img src="/static/icon.svg" alt="" width="28" height="28"
             style="filter:drop-shadow(0 0 9px #8b5cf955)">
        <h1 class="text-lg font-bold tracking-tight text-white">dboard</h1>
      </div>
      <p id="summary" class="text-sm text-gray-500" style="margin-left:2.375rem">loading…</p>
    </div>
    <div id="clock" class="mono text-xs text-gray-600 shrink-0 mt-1"></div>
  </header>

  <!-- Tab bar -->
  <nav class="tab-bar">
    <button class="tab-btn" data-tab="containers">
      Containers <span id="badge-containers" class="tab-badge"></span>
    </button>
    <button class="tab-btn" data-tab="system">
      System
    </button>
    <button class="tab-btn" data-tab="networks">
      Networks <span id="badge-networks" class="tab-badge"></span>
    </button>
    <button class="tab-btn" data-tab="tokens">
      Tokens <span id="badge-tokens" class="tab-badge"></span>
    </button>
  </nav>

  <!-- Error (shown in all tabs) -->
  <div id="error-banner"
       style="display:none;align-items:center;gap:.625rem;padding:.75rem 1rem;
              border-radius:.75rem;border:1px solid #991b1b;background:#2b0d0d;
              color:#f87171;font-size:.875rem;margin-bottom:1.5rem">
    <span style="font-weight:700;flex-shrink:0">!</span>
    <span id="error-text"></span>
  </div>

  <!-- Tab: Containers -->
  <div id="tab-containers" class="tab-panel">

    <!-- Global stacked resource chart -->
    <div class="stack-panel mb-8">
      <div class="stack-head">
        <div class="stack-title">Resource usage <span id="stack-total"></span></div>
        <div class="stack-controls">
          <div class="seg" id="stack-metric">
            <button class="seg-btn active" data-metric="cpu">CPU</button>
            <button class="seg-btn" data-metric="mem">Memory</button>
            <button class="seg-btn" data-metric="net">Net</button>
          </div>
          <div class="seg" id="stack-range">
            <button class="seg-btn" data-range="600">10m</button>
            <button class="seg-btn active" data-range="3600">1h</button>
            <button class="seg-btn" data-range="21600">6h</button>
            <button class="seg-btn" data-range="86400">24h</button>
          </div>
        </div>
      </div>
      <div id="stack-chart" class="stack-chart"></div>
      <div id="stack-guide" class="stack-guide"></div>
      <div id="stack-tip" class="stack-tip"></div>
      <div id="stack-legend" class="stack-legend"></div>
    </div>

    <div class="mb-8" id="section-proxied">
      <div class="section-bar">
        <div class="section-title">Proxied <span id="lbl-proxied"></span></div>
        <input id="filter-proxied" type="text" class="filter-input" placeholder="Filter…">
      </div>
      <div class="tbl-wrap">
        <table class="tbl">
          <thead>
            <tr>
              <th class="sortable" data-table="proxied" data-col="status">Status<span class="sort-icon"></span></th>
              <th class="sortable" data-table="proxied" data-col="name">Name<span class="sort-icon"></span></th>
              <th class="sortable" data-table="proxied" data-col="domains">Domains<span class="sort-icon"></span></th>
              <th class="sortable hidden sm:table-cell" data-table="proxied" data-col="image">Image<span class="sort-icon"></span></th>
              <th class="sortable" data-table="proxied" data-col="health">Health<span class="sort-icon"></span></th>
              <th class="sortable" data-table="proxied" data-col="uptime">Uptime<span class="sort-icon"></span></th>
              <th class="sortable" data-table="proxied" data-col="cpu">CPU<span class="sort-icon"></span></th>
              <th class="sortable" data-table="proxied" data-col="ram">RAM<span class="sort-icon"></span></th>
              <th class="sortable" data-table="proxied" data-col="net">Net I/O<span class="sort-icon"></span></th>
            </tr>
          </thead>
          <tbody id="proxied-body">
            <tr class="pulse"><td colspan="9" style="height:2.5rem;background:#0d0e1a"></td></tr>
            <tr class="pulse" style="animation-delay:.1s"><td colspan="9" style="height:2.5rem;background:#0d0e1a"></td></tr>
            <tr class="pulse" style="animation-delay:.2s"><td colspan="9" style="height:2.5rem;background:#0d0e1a"></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div>
      <div class="section-bar">
        <div class="section-title">Other containers <span id="lbl-others"></span></div>
        <input id="filter-others" type="text" class="filter-input" placeholder="Filter…">
      </div>
      <div class="tbl-wrap">
        <table class="tbl">
          <thead>
            <tr>
              <th class="sortable" data-table="others" data-col="status">Status<span class="sort-icon"></span></th>
              <th class="sortable" data-table="others" data-col="name">Name<span class="sort-icon"></span></th>
              <th class="sortable" data-table="others" data-col="image">Image<span class="sort-icon"></span></th>
              <th class="sortable" data-table="others" data-col="health">Health<span class="sort-icon"></span></th>
              <th class="sortable" data-table="others" data-col="uptime">Uptime<span class="sort-icon"></span></th>
              <th class="sortable" data-table="others" data-col="cpu">CPU<span class="sort-icon"></span></th>
              <th class="sortable" data-table="others" data-col="ram">RAM<span class="sort-icon"></span></th>
              <th class="sortable" data-table="others" data-col="net">Net I/O<span class="sort-icon"></span></th>
            </tr>
          </thead>
          <tbody id="others-body">
            <tr class="pulse"><td colspan="8" style="height:2.5rem;background:#0d0e1a"></td></tr>
            <tr class="pulse" style="animation-delay:.1s"><td colspan="8" style="height:2.5rem;background:#0d0e1a"></td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div><!-- /tab-containers -->

  <!-- Tab: Networks -->
  <div id="tab-networks" class="tab-panel">
    <div class="section-bar mb-4">
      <div class="section-title">Networks <span id="lbl-networks" class="text-gray-400 text-sm font-normal"></span></div>
    </div>
    <div id="networks-grid" class="net-grid"></div>
  </div>

  <!-- Tab: System -->
  <div id="tab-system" class="tab-panel">
    <div id="sys-grid" class="sys-grid"></div>
  </div>

  <!-- Tab: Tokens -->
  <div id="tab-tokens" class="tab-panel">
    <div class="section-bar">
      <div class="section-title">API Tokens <span id="lbl-tokens"></span></div>
      <button class="refresh-btn" id="tok-refresh-btn">↻ refresh</button>
    </div>
    <div id="tok-grid" class="tok-grid"></div>
  </div>

</div>

<!-- Container detail overlay -->
<div id="detail-overlay" class="overlay" aria-hidden="true">
  <div class="overlay-panel" id="detail-panel" role="dialog" aria-modal="true"></div>
</div>

<script src="/static/app.js" defer></script>
</body>
</html>
