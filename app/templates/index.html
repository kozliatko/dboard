<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: #07080f;
      min-height: 100svh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(139,92,246,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139,92,246,.03) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    .page { position: relative; z-index: 1; }

    .mono { font-family: 'JetBrains Mono', monospace; }

    /* Table */
    .tbl-wrap {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid #1c1d30;
      background: #0d0e1a;
    }

    .tbl { width: 100%; border-collapse: collapse; }

    .tbl th {
      font-size: .6rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #4b5563;
      text-align: left;
      padding: .6rem .9rem;
      white-space: nowrap;
      border-bottom: 1px solid #1c1d30;
    }

    .tbl th.sortable {
      cursor: pointer;
      user-select: none;
      transition: color .15s;
    }
    .tbl th.sortable:hover { color: #9ca3af; }
    .tbl th.th-active { color: #a78bfa; }
    .sort-icon { display: inline-block; width: .9em; opacity: .5; }
    .tbl th.th-active .sort-icon { opacity: 1; }

    .tbl td {
      padding: .65rem .9rem;
      vertical-align: middle;
      border-bottom: 1px solid #111220;
      white-space: nowrap;
    }

    .tbl tbody tr:last-child td { border-bottom: none; }
    .tbl tbody tr:hover td { background: rgba(139,92,246,.04); }

    /* Status badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: .68rem;
      font-weight: 500;
      padding: .2em .55em;
      border-radius: 5px;
      white-space: nowrap;
    }
    .badge-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

    .badge-running    { background:#0d2b1a; color:#4ade80; border:1px solid #166534; }
    .badge-running .badge-dot { background:#4ade80; box-shadow:0 0 5px #4ade8099; }
    .badge-exited     { background:#2b0d0d; color:#f87171; border:1px solid #991b1b; }
    .badge-exited .badge-dot { background:#f87171; }
    .badge-paused     { background:#2b250d; color:#fbbf24; border:1px solid #92400e; }
    .badge-paused .badge-dot { background:#fbbf24; }
    .badge-restarting { background:#0d1a2b; color:#60a5fa; border:1px solid #1d4ed8; }
    .badge-restarting .badge-dot { background:#60a5fa; }
    .badge-dead       { background:#1a1a1a; color:#6b7280; border:1px solid #374151; }
    .badge-dead .badge-dot { background:#4b5563; }

    /* Health */
    .h-healthy   { color:#4ade80; }
    .h-unhealthy { color:#f87171; }
    .h-starting  { color:#fbbf24; }

    /* Domain chip */
    .chip {
      font-family: 'JetBrains Mono', monospace;
      font-size: .65rem;
      padding: .15em .45em;
      border-radius: 4px;
      background: #12103a;
      color: #a78bfa;
      border: 1px solid #2e2b60;
      display: inline-block;
      text-decoration: none;
      transition: color .15s, border-color .15s;
      margin-right: .25rem;
    }
    .chip:hover { color:#c4b5fd; border-color:#4c3fb5; }

    /* Stat cell */
    .stat-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: .78rem;
      font-weight: 500;
      line-height: 1;
    }
    .stat-bar-wrap {
      height: 2px;
      background: #1a1b2e;
      border-radius: 1px;
      margin-top: 4px;
      width: 56px;
    }
    .stat-bar-fill { height: 2px; border-radius: 1px; transition: width .7s; }

    /* Section bar */
    .section-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: .6rem;
      flex-wrap: wrap;
    }
    .section-title {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #4b5563;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .section-title span {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
      color: #374151;
      font-size: .65rem;
    }

    /* Filter input */
    .filter-input {
      background: #13142a;
      border: 1px solid #2e3055;
      border-radius: 7px;
      color: #e2e8f0;
      font-family: 'JetBrains Mono', monospace;
      font-size: .72rem;
      padding: .35rem .75rem;
      outline: none;
      width: 200px;
      transition: border-color .2s, box-shadow .2s, width .2s;
    }
    .filter-input:focus {
      border-color: #6d4fc4;
      box-shadow: 0 0 0 2px rgba(109,79,196,.2);
      width: 260px;
    }
    .filter-input::placeholder { color: #3d4068; }
    @media (max-width: 480px) {
      .filter-input, .filter-input:focus { width: 100%; }
      .section-bar { flex-direction: column; align-items: flex-start; }
    }

    /* Empty row */
    .empty-row td {
      text-align: center;
      padding: 2rem;
      color: #374151;
      font-size: .8rem;
      font-style: italic;
    }

    /* Skeleton */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .pulse { animation: pulse 1.8s ease-in-out infinite; }

    /* System stats panel */
    .sys-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: .65rem;
      margin-bottom: 2rem;
    }
    .sys-card {
      background: #0d0e1a;
      border: 1px solid #1c1d30;
      border-radius: 10px;
      padding: .75rem .9rem;
    }
    .sys-card-label {
      font-size: .58rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #4b5563;
      margin-bottom: .4rem;
    }
    .sys-card-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.35rem;
      font-weight: 500;
      line-height: 1;
      margin-bottom: .35rem;
    }
    .sys-card-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: .62rem;
      color: #4b5563;
      margin-top: .3rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sys-bar-wrap {
      height: 3px;
      background: #1a1b2e;
      border-radius: 2px;
      margin: .4rem 0 .25rem;
    }
    .sys-bar-fill { height: 3px; border-radius: 2px; transition: width .8s; }

    /* Threshold levels */
    @keyframes crit-pulse {
      0%,100% { box-shadow: 0 0 0 1px #991b1b30; }
      50%      { box-shadow: 0 0 14px #ef444448; }
    }
    .sys-card.warn { border-color: #92400e; }
    .sys-card.crit { border-color: #7f1d1d; animation: crit-pulse 2.5s ease-in-out infinite; }

    /* Row thresholds */
    .tbl tbody tr.row-warn td:first-child { box-shadow: inset 2px 0 0 #92400e; }
    .tbl tbody tr.row-crit td:first-child { box-shadow: inset 2px 0 0 #991b1b; }
    .tbl tbody tr.row-crit td { background: rgba(239,68,68,.025); }

    /* Token cards */
    .tok-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: .65rem;
    }
    .tok-card {
      background: #0d0e1a;
      border: 1px solid #1c1d30;
      border-radius: 10px;
      padding: .75rem .9rem;
      border-left: 3px solid #1c1d30;
      transition: border-color .2s;
    }
    .tok-card.valid   { border-left-color: #166534; }
    .tok-card.invalid { border-left-color: #991b1b; }
    .tok-card.unconfigured { opacity: .45; }
    .tok-name {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: .4rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .tok-status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tok-status-dot.valid   { background: #4ade80; box-shadow: 0 0 6px #4ade8088; }
    .tok-status-dot.invalid { background: #f87171; }
    .tok-status-dot.unconfigured { background: #374151; }
    .tok-hint {
      font-family: 'JetBrains Mono', monospace;
      font-size: .68rem;
      color: #4b5563;
      margin-bottom: .3rem;
    }
    .tok-detail {
      font-size: .72rem;
      color: #6b7280;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tok-detail.valid { color: #86efac; }
    .tok-detail.invalid { color: #fca5a5; }
    .tok-extras {
      margin-top: .5rem;
      border-top: 1px solid #1c1d30;
      padding-top: .45rem;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: .15rem .6rem;
    }
    .tok-extra-label {
      font-size: .6rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #374151;
      white-space: nowrap;
      padding-top: .05rem;
    }
    .tok-extra-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: .65rem;
      color: #6b7280;
      word-break: break-all;
    }
    .tok-checked {
      font-family: 'JetBrains Mono', monospace;
      font-size: .58rem;
      color: #374151;
      margin-top: .4rem;
    }
    .refresh-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: .65rem;
      color: #4b5563;
      background: none;
      border: 1px solid #1c1d30;
      border-radius: 5px;
      padding: .2em .6em;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .refresh-btn:hover { color: #a78bfa; border-color: #4c3fb5; }
    .refresh-btn:disabled { opacity: .4; cursor: default; }

    /* Tab bar */
    .tab-bar {
      display: flex;
      gap: .1rem;
      border-bottom: 1px solid #1c1d30;
      margin-bottom: 1.75rem;
    }
    .tab-btn {
      font-family: 'Outfit', sans-serif;
      font-size: .78rem;
      font-weight: 600;
      color: #4b5563;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: .55rem 1.1rem;
      cursor: pointer;
      transition: color .15s, border-color .15s;
      margin-bottom: -1px;
      letter-spacing: .03em;
      display: flex;
      align-items: center;
      gap: .45rem;
      white-space: nowrap;
    }
    .tab-btn:hover { color: #9ca3af; }
    .tab-btn.active { color: #a78bfa; border-bottom-color: #a78bfa; }

    .tab-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: .6rem;
      font-weight: 400;
      color: #374151;
      background: #13142a;
      border: 1px solid #1c1d30;
      border-radius: 4px;
      padding: .05em .4em;
      transition: color .2s;
    }
    .tab-btn.active .tab-badge { color: #6d5ea8; border-color: #2e2b60; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2e2e50; border-radius: 3px; }
  </style>
</head>
<body class="text-gray-300">

<div class="page max-w-6xl mx-auto px-4 pt-6 pb-14 sm:px-6">

  <!-- Header -->
  <header class="mb-8 flex items-start justify-between gap-4">
    <div>
      <div class="flex items-center gap-2.5 mb-1">
        <div class="w-2.5 h-2.5 rounded-full bg-violet-500"
             style="box-shadow:0 0 10px #8b5cf699"></div>
        <h1 class="text-lg font-bold tracking-tight text-white">dboard</h1>
      </div>
      <p id="summary" class="text-sm text-gray-500 ml-5">loading…</p>
    </div>
    <div id="clock" class="mono text-xs text-gray-600 shrink-0 mt-1"></div>
  </header>

  <!-- Tab bar -->
  <nav class="tab-bar">
    <button class="tab-btn" data-tab="containers" onclick="switchTab('containers')">
      Containers <span id="badge-containers" class="tab-badge"></span>
    </button>
    <button class="tab-btn" data-tab="system" onclick="switchTab('system')">
      System
    </button>
    <button class="tab-btn" data-tab="tokens" onclick="switchTab('tokens')">
      Tokens <span id="badge-tokens" class="tab-badge"></span>
    </button>
  </nav>

  <!-- Error (shown in all tabs) -->
  <div id="error-banner"
       style="display:none;align-items:center;gap:.625rem;padding:.75rem 1rem;
              border-radius:.75rem;border:1px solid #991b1b;background:#2b0d0d;
              color:#f87171;font-size:.875rem;margin-bottom:1.5rem">
    <span style="font-weight:700;flex-shrink:0">!</span>
    <span id="error-text"></span>
  </div>

  <!-- Tab: Containers -->
  <div id="tab-containers" class="tab-panel">

    <div class="mb-8">
      <div class="section-bar">
        <div class="section-title">Proxied <span id="lbl-proxied"></span></div>
        <input id="filter-proxied" type="text" class="filter-input" placeholder="Filter…" oninput="redraw('proxied')">
      </div>
      <div class="tbl-wrap">
        <table class="tbl">
          <thead>
            <tr>
              <th class="sortable" data-table="proxied" data-col="status"  onclick="sortTable('proxied','status')">Status<span class="sort-icon"></span></th>
              <th class="sortable" data-table="proxied" data-col="name"    onclick="sortTable('proxied','name')">Name<span class="sort-icon"></span></th>
              <th class="sortable" data-table="proxied" data-col="domains" onclick="sortTable('proxied','domains')">Domains<span class="sort-icon"></span></th>
              <th class="sortable hidden sm:table-cell" data-table="proxied" data-col="image" onclick="sortTable('proxied','image')">Image<span class="sort-icon"></span></th>
              <th class="sortable" data-table="proxied" data-col="health"  onclick="sortTable('proxied','health')">Health<span class="sort-icon"></span></th>
              <th class="sortable" data-table="proxied" data-col="uptime"  onclick="sortTable('proxied','uptime')">Uptime<span class="sort-icon"></span></th>
              <th class="sortable" data-table="proxied" data-col="cpu"     onclick="sortTable('proxied','cpu')">CPU<span class="sort-icon"></span></th>
              <th class="sortable" data-table="proxied" data-col="ram"     onclick="sortTable('proxied','ram')">RAM<span class="sort-icon"></span></th>
              <th class="sortable" data-table="proxied" data-col="net"     onclick="sortTable('proxied','net')">Net I/O<span class="sort-icon"></span></th>
            </tr>
          </thead>
          <tbody id="proxied-body">
            <tr class="pulse"><td colspan="9" style="height:2.5rem;background:#0d0e1a"></td></tr>
            <tr class="pulse" style="animation-delay:.1s"><td colspan="9" style="height:2.5rem;background:#0d0e1a"></td></tr>
            <tr class="pulse" style="animation-delay:.2s"><td colspan="9" style="height:2.5rem;background:#0d0e1a"></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div>
      <div class="section-bar">
        <div class="section-title">Other containers <span id="lbl-others"></span></div>
        <input id="filter-others" type="text" class="filter-input" placeholder="Filter…" oninput="redraw('others')">
      </div>
      <div class="tbl-wrap">
        <table class="tbl">
          <thead>
            <tr>
              <th class="sortable" data-table="others" data-col="status" onclick="sortTable('others','status')">Status<span class="sort-icon"></span></th>
              <th class="sortable" data-table="others" data-col="name"   onclick="sortTable('others','name')">Name<span class="sort-icon"></span></th>
              <th class="sortable" data-table="others" data-col="image"  onclick="sortTable('others','image')">Image<span class="sort-icon"></span></th>
              <th class="sortable" data-table="others" data-col="health" onclick="sortTable('others','health')">Health<span class="sort-icon"></span></th>
              <th class="sortable" data-table="others" data-col="uptime" onclick="sortTable('others','uptime')">Uptime<span class="sort-icon"></span></th>
              <th class="sortable" data-table="others" data-col="cpu"    onclick="sortTable('others','cpu')">CPU<span class="sort-icon"></span></th>
              <th class="sortable" data-table="others" data-col="ram"    onclick="sortTable('others','ram')">RAM<span class="sort-icon"></span></th>
              <th class="sortable" data-table="others" data-col="net"    onclick="sortTable('others','net')">Net I/O<span class="sort-icon"></span></th>
            </tr>
          </thead>
          <tbody id="others-body">
            <tr class="pulse"><td colspan="8" style="height:2.5rem;background:#0d0e1a"></td></tr>
            <tr class="pulse" style="animation-delay:.1s"><td colspan="8" style="height:2.5rem;background:#0d0e1a"></td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div><!-- /tab-containers -->

  <!-- Tab: System -->
  <div id="tab-system" class="tab-panel">
    <div id="sys-grid" class="sys-grid"></div>
  </div>

  <!-- Tab: Tokens -->
  <div id="tab-tokens" class="tab-panel">
    <div class="section-bar">
      <div class="section-title">API Tokens <span id="lbl-tokens"></span></div>
      <button class="refresh-btn" id="tok-refresh-btn" onclick="refreshTokens(true)">↻ refresh</button>
    </div>
    <div id="tok-grid" class="tok-grid"></div>
  </div>

</div>

<script>
  const $ = id => document.getElementById(id);
  const esc = s => String(s||'').replace(/[&<>"']/g,
    c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  const STATUSES = ['running','exited','paused','restarting','dead'];

  // ── Tabs ────────────────────────────────────────────────────────────────────

  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.tab === name)
    );
    document.querySelectorAll('.tab-panel').forEach(p =>
      p.classList.toggle('active', p.id === 'tab-' + name)
    );
    try { localStorage.setItem('dboard-tab', name); } catch(_) {}
  }

  // Restore last active tab
  switchTab((() => { try { return localStorage.getItem('dboard-tab') || 'containers'; } catch(_) { return 'containers'; } })());

  // ── Render helpers ──────────────────────────────────────────────────────────

  function badge(status) {
    const cls = STATUSES.includes(status) ? status : 'dead';
    return `<span class="badge badge-${cls}"><span class="badge-dot"></span>${esc(status)}</span>`;
  }

  function barColor(pct) {
    if (pct > 80) return '#f87171';
    if (pct > 55) return '#fb923c';
    return '#818cf8';
  }

  function statCell(val, pct, unit, spark) {
    if (val == null) return '<td class="text-gray-700 mono text-xs">—</td>';
    const color = barColor(pct);
    const w = Math.min(Math.max(pct||0, 0), 100).toFixed(1);
    const sp = (spark && spark.length >= 2)
      ? '<div style="margin-top:3px">' + sparkline(spark, color, 52, 10) + '</div>'
      : '';
    return `<td><div class="stat-val" style="color:${color}">${val}<span class="text-gray-600" style="font-size:.65rem">${unit}</span></div><div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:${w}%;background:${color}"></div></div>${sp}</td>`;
  }

  function memCell(c) {
    if (c.mem_mb == null) return '<td class="text-gray-700 mono text-xs">—</td>';
    const lbl = (c.mem_limit_mb > 0 && c.mem_limit_mb < 999999)
      ? `${c.mem_mb}<span style="color:#4b5563;font-size:.65rem">/${c.mem_limit_mb}</span>`
      : `${c.mem_mb}`;
    const color = barColor(c.mem_percent);
    const w = Math.min(c.mem_percent||0, 100).toFixed(1);
    const sp = (c.mem_spark && c.mem_spark.length >= 2)
      ? '<div style="margin-top:3px">' + sparkline(c.mem_spark, color, 52, 10) + '</div>'
      : '';
    return `<td><div class="stat-val" style="color:${color}">${lbl}<span class="text-gray-600" style="font-size:.65rem"> MB</span></div><div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:${w}%;background:${color}"></div></div>${sp}</td>`;
  }

  function fmtBytes(b) {
    if (b == null) return '—';
    if (b < 1024)             return b + ' B';
    if (b < 1048576)          return (b / 1024).toFixed(1) + ' KB';
    if (b < 1073741824)       return (b / 1048576).toFixed(1) + ' MB';
    return (b / 1073741824).toFixed(2) + ' GB';
  }

  function netCell(rx, tx) {
    if (rx == null) return '<td class="text-gray-700 mono text-xs">—</td>';
    return `<td><div class="mono" style="font-size:.68rem;line-height:1.6"><span style="color:#34d399">↓${fmtBytes(rx)}</span><br><span style="color:#60a5fa">↑${fmtBytes(tx)}</span></div></td>`;
  }

  function uptimeBadge(uptime) {
    return uptime
      ? `<span class="mono text-xs text-gray-400">↑${esc(uptime)}</span>`
      : '<span class="text-gray-700 mono text-xs">—</span>';
  }

  function healthBadge(health) {
    return health
      ? `<span class="mono text-xs h-${esc(health)}">${esc(health)}</span>`
      : '<span class="text-gray-700 mono text-xs">—</span>';
  }

  function rowLevel(c) {
    if (c.status !== 'running') return '';
    const m = Math.max(c.cpu_percent || 0, c.mem_percent || 0);
    if (m >= 90) return 'row-crit';
    if (m >= 75) return 'row-warn';
    return '';
  }

  function renderProxied(rows) {
    if (!rows.length) return '<tr class="empty-row"><td colspan="9">No matching containers</td></tr>';
    return rows.map(c => {
      const chips = (c.domains||[])
        .map(d => `<a href="https://${esc(d)}" target="_blank" class="chip">${esc(d)}</a>`)
        .join('') || '<span class="text-gray-700 text-xs mono">—</span>';
      return `<tr class="${rowLevel(c)}">
        <td>${badge(c.status)}</td>
        <td><span class="font-semibold text-white text-sm">${esc(c.name)}</span></td>
        <td style="max-width:260px">${chips}</td>
        <td class="hidden sm:table-cell mono text-xs text-gray-500" style="max-width:200px;overflow:hidden;text-overflow:ellipsis" title="${esc(c.image)}">${esc(c.image)}</td>
        <td>${healthBadge(c.health)}</td>
        <td>${uptimeBadge(c.uptime)}</td>
        ${c.cpu_percent != null ? statCell(c.cpu_percent, c.cpu_percent, '%', c.cpu_spark) : '<td class="text-gray-700 mono text-xs">—</td>'}
        ${memCell(c)}
        ${netCell(c.net_rx, c.net_tx)}
      </tr>`;
    }).join('');
  }

  function renderOthers(rows) {
    if (!rows.length) return '<tr class="empty-row"><td colspan="8">No matching containers</td></tr>';
    return rows.map(c => `<tr class="${rowLevel(c)}">
      <td>${badge(c.status)}</td>
      <td><span class="font-semibold text-white text-sm">${esc(c.name)}</span></td>
      <td class="mono text-xs text-gray-500" style="max-width:200px;overflow:hidden;text-overflow:ellipsis" title="${esc(c.image)}">${esc(c.image)}</td>
      <td>${healthBadge(c.health)}</td>
      <td>${uptimeBadge(c.uptime)}</td>
      ${c.cpu_percent != null ? statCell(c.cpu_percent, c.cpu_percent, '%', c.cpu_spark) : '<td class="text-gray-700 mono text-xs">—</td>'}
      ${memCell(c)}
      ${netCell(c.net_rx, c.net_tx)}
    </tr>`).join('');
  }

  // ── System stats ────────────────────────────────────────────────────────────

  function sysBarColor(pct) {
    if (pct > 85) return '#f87171';
    if (pct > 65) return '#fb923c';
    return '#34d399';
  }

  function fmtMb(mb) {
    return mb >= 1024 ? (mb / 1024).toFixed(1) + ' GB' : mb + ' MB';
  }

  function thresholdClass(pct, warnAt, critAt) {
    warnAt = warnAt || 70; critAt = critAt || 85;
    if (pct >= critAt) return 'crit';
    if (pct >= warnAt) return 'warn';
    return '';
  }

  function sparkline(data, color, w, h) {
    w = w || 80; h = h || 18;
    if (!data || data.length < 2) return '';
    const max = Math.max.apply(null, data.concat(0.001));
    const pts = data.map(function(v, i) {
      const x = (i / (data.length - 1)) * w;
      const y = h - (v / max) * h * 0.88 + h * 0.06;
      return x.toFixed(1) + ',' + y.toFixed(1);
    }).join(' ');
    return '<svg width="' + w + '" height="' + h + '" style="display:block;overflow:visible" viewBox="0 0 ' + w + ' ' + h + '">' +
      '<polyline points="' + pts + '" fill="none" stroke="' + color + '" stroke-width="1.5" ' +
      'stroke-linejoin="round" stroke-linecap="round" opacity=".65"/></svg>';
  }

  function sparklineDual(d1, c1, d2, c2, w, h) {
    w = w || 80; h = h || 22;
    const all = (d1 || []).concat(d2 || []);
    if (all.length < 2) return '';
    const max = Math.max.apply(null, all.concat(0.001));
    function pts(data) {
      if (!data || data.length < 2) return '';
      return data.map(function(v, i) {
        const x = (i / (data.length - 1)) * w;
        const y = h - (v / max) * h * 0.88 + h * 0.06;
        return x.toFixed(1) + ',' + y.toFixed(1);
      }).join(' ');
    }
    let svg = '<svg width="' + w + '" height="' + h + '" style="display:block;overflow:visible" viewBox="0 0 ' + w + ' ' + h + '">';
    const p1 = pts(d1), p2 = pts(d2);
    if (p1) svg += '<polyline points="' + p1 + '" fill="none" stroke="' + c1 + '" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" opacity=".65"/>';
    if (p2) svg += '<polyline points="' + p2 + '" fill="none" stroke="' + c2 + '" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" opacity=".65"/>';
    svg += '</svg>';
    return svg;
  }

  function sysCard(label, valueHtml, pct, sub, spark, sparkColor, warnAt, critAt) {
    const color = sysBarColor(pct);
    const w = Math.min(pct || 0, 100).toFixed(1);
    const level = thresholdClass(pct, warnAt, critAt);
    const sparkHtml = spark
      ? '<div style="margin:.25rem 0 .1rem">' + sparkline(spark, sparkColor || color) + '</div>'
      : '';
    return `<div class="sys-card ${level}">
      <div class="sys-card-label">${label}</div>
      <div class="sys-card-value" style="color:${color}">${valueHtml}</div>
      <div class="sys-bar-wrap"><div class="sys-bar-fill" style="width:${w}%;background:${color}"></div></div>
      ${sparkHtml}
      <div class="sys-card-sub">${sub}</div>
    </div>`;
  }

  function renderSystem(s) {
    let html = '';
    const sp = s.sparklines || {};

    // CPU
    const loadStr = s.load_avg
      ? `load ${s.load_avg[0]} ${s.load_avg[1]} ${s.load_avg[2]}`
      : '';
    html += sysCard(
      'CPU',
      `${s.cpu_percent}<span style="font-size:.7rem;color:#6b7280">%</span>`,
      s.cpu_percent,
      `${s.cpu_phys} cores (${s.cpu_count} threads)${loadStr ? ' · ' + loadStr : ''}`,
      sp.cpu, null, 70, 90
    );

    // RAM
    html += sysCard(
      'RAM',
      `<span style="font-size:.95rem">${fmtMb(s.mem_used_mb)}</span>`,
      s.mem_percent,
      `${s.mem_percent}% of ${fmtMb(s.mem_total_mb)}`,
      sp.mem, null, 80, 92
    );

    // CPU Temperature
    if (s.cpu_temp != null) {
      const tempPct = Math.min(s.cpu_temp, 100);
      const tempSub = s.cpu_temp >= 85 ? 'critical' : s.cpu_temp >= 70 ? 'warm' : 'nominal';
      html += sysCard(
        'CPU Temp',
        `${s.cpu_temp}<span style="font-size:.7rem;color:#6b7280">°C</span>`,
        tempPct,
        tempSub,
        sp.temp, '#fb923c', 70, 85
      );
    }

    // Swap (only if exists)
    if (s.swap_total_mb > 0) {
      html += sysCard(
        'Swap',
        `<span style="font-size:.95rem">${fmtMb(s.swap_used_mb)}</span>`,
        s.swap_percent,
        `${s.swap_percent}% of ${fmtMb(s.swap_total_mb)}`
      );
    }

    // Disks
    for (const d of (s.disks || [])) {
      html += sysCard(
        `Disk ${esc(d.mount)}`,
        `<span style="font-size:.9rem">${d.used_gb} <span style="font-size:.65rem;color:#6b7280">/ ${d.total_gb} GB</span></span>`,
        d.percent,
        `${d.percent}% · ${d.free_gb} GB free`,
        null, null, 80, 92
      );
    }

    // Net I/O rate
    if (s.net_rate) {
      const netSpark = (sp.net_rx || sp.net_tx)
        ? '<div style="margin:.25rem 0 .1rem">' + sparklineDual(sp.net_rx, '#34d399', sp.net_tx, '#60a5fa') + '</div>'
        : '';
      html += `<div class="sys-card">
        <div class="sys-card-label">Net I/O</div>
        <div class="sys-card-value" style="font-size:.85rem;padding-top:.15rem;line-height:1.7">
          <span style="color:#34d399">↓${fmtBytes(s.net_rate.rx_bps)}/s</span><br>
          <span style="color:#60a5fa">↑${fmtBytes(s.net_rate.tx_bps)}/s</span>
        </div>
        ${netSpark}
        <div class="sys-card-sub">all interfaces · live</div>
      </div>`;
    }

    // Disk I/O rate
    if (s.disk_rate) {
      const diskSpark = (sp.disk_r || sp.disk_w)
        ? '<div style="margin:.25rem 0 .1rem">' + sparklineDual(sp.disk_r, '#f59e0b', sp.disk_w, '#a78bfa') + '</div>'
        : '';
      html += `<div class="sys-card">
        <div class="sys-card-label">Disk I/O</div>
        <div class="sys-card-value" style="font-size:.85rem;padding-top:.15rem;line-height:1.7">
          <span style="color:#f59e0b">↓${fmtBytes(s.disk_rate.read_bps)}/s</span><br>
          <span style="color:#a78bfa">↑${fmtBytes(s.disk_rate.write_bps)}/s</span>
        </div>
        ${diskSpark}
        <div class="sys-card-sub">all disks · live</div>
      </div>`;
    }

    // Uptime card (no bar)
    if (s.uptime) {
      html += `<div class="sys-card">
        <div class="sys-card-label">Uptime</div>
        <div class="sys-card-value" style="color:#818cf8;font-size:1rem;padding-top:.2rem">${esc(s.uptime)}</div>
        <div class="sys-bar-wrap" style="background:transparent"></div>
        <div class="sys-card-sub">since last boot</div>
      </div>`;
    }

    $('sys-grid').innerHTML = html;
  }

  function xhrJson(url) {
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('GET', url);
      xhr.onload = () => {
        if (xhr.status >= 200 && xhr.status < 300) {
          try { resolve(JSON.parse(xhr.responseText)); }
          catch(e) { reject(new Error('JSON parse error')); }
        } else {
          reject(new Error(`HTTP ${xhr.status}`));
        }
      };
      xhr.onerror   = () => reject(new Error('network error'));
      xhr.ontimeout = () => reject(new Error('timeout'));
      xhr.timeout = 10000;
      xhr.send();
    });
  }

  // ── Sort & filter ───────────────────────────────────────────────────────────

  const rawData = { proxied: [], others: [] };
  const sortState = {
    proxied: { col: null, dir: 1 },
    others:  { col: null, dir: 1 },
  };

  function uptimeSecs(s) {
    if (!s) return -1;
    let t = 0;
    const d = s.match(/(\d+)d/); if (d) t += +d[1] * 86400;
    const h = s.match(/(\d+)h/); if (h) t += +h[1] * 3600;
    const m = s.match(/(\d+)m/); if (m) t += +m[1] * 60;
    return t;
  }

  const colKey = {
    status:  c => c.status,
    name:    c => c.name.toLowerCase(),
    domains: c => (c.domains||[]).join(',').toLowerCase(),
    image:   c => (c.image||'').toLowerCase(),
    health:  c => c.health || '',
    uptime:  c => uptimeSecs(c.uptime),
    cpu:     c => c.cpu_percent ?? -1,
    ram:     c => c.mem_mb ?? -1,
    net:     c => (c.net_rx||0) + (c.net_tx||0),
  };

  function applyFilter(rows, q) {
    if (!q) return rows;
    const lq = q.toLowerCase();
    return rows.filter(c =>
      c.name.toLowerCase().includes(lq) ||
      (c.image||'').toLowerCase().includes(lq) ||
      (c.status||'').toLowerCase().includes(lq) ||
      (c.health||'').toLowerCase().includes(lq) ||
      (c.domains||[]).some(d => d.toLowerCase().includes(lq))
    );
  }

  function applySort(rows, table) {
    const { col, dir } = sortState[table];
    if (!col) return rows;
    const fn = colKey[col];
    return [...rows].sort((a, b) => {
      const av = fn(a), bv = fn(b);
      return av < bv ? -dir : av > bv ? dir : 0;
    });
  }

  function sortTable(table, col) {
    if (sortState[table].col === col) {
      sortState[table].dir *= -1;
    } else {
      sortState[table].col = col;
      sortState[table].dir = 1;
    }
    document.querySelectorAll(`th[data-table="${table}"]`).forEach(th => {
      const active = th.dataset.col === col;
      th.classList.toggle('th-active', active);
      const icon = th.querySelector('.sort-icon');
      if (icon) icon.textContent = active ? (sortState[table].dir === 1 ? ' ↑' : ' ↓') : '';
    });
    redraw(table);
  }

  function redraw(table) {
    const q = ($(`filter-${table}`) || {value:''}).value.trim();
    let rows = applyFilter(rawData[table], q);
    rows = applySort(rows, table);
    $(`${table}-body`).innerHTML = (table === 'proxied' ? renderProxied : renderOthers)(rows);
  }

  // ── Tokens ──────────────────────────────────────────────────────────────────

  function renderTokens(tokens) {
    if (!tokens.length) {
      $('tok-grid').innerHTML = '<span style="color:#374151;font-size:.8rem;font-style:italic">No tokens configured</span>';
      return;
    }
    tokens = tokens.filter(t => t.configured);
    const configured = tokens;
    const valid = configured.filter(t => t.valid).length;
    $('lbl-tokens').textContent = configured.length
      ? `${valid} valid / ${configured.length} configured`
      : 'none configured';
    $('badge-tokens').textContent = configured.length
      ? `${valid} / ${configured.length}`
      : '';

    $('tok-grid').innerHTML = tokens.map(t => {
      const cls = !t.configured ? 'unconfigured' : t.valid ? 'valid' : 'invalid';
      const statusLabel = !t.configured ? 'not set' : t.valid ? 'valid' : 'invalid';
      const detail = t.error || t.detail || '—';
      const extras = t.extras || [];
      const checkedAt = t.checked_at
        ? `checked ${new Date(t.checked_at).toLocaleTimeString()}`
        : '';
      const extrasHtml = extras.length
        ? `<div class="tok-extras">${extras.map(e =>
            `<span class="tok-extra-label">${esc(e.label)}</span><span class="tok-extra-value">${esc(e.value)}</span>`
          ).join('')}</div>`
        : '';
      return `<div class="tok-card ${cls}">
        <div class="tok-name">
          ${esc(t.name)}
          <span class="tok-status-dot ${cls}" title="${statusLabel}"></span>
        </div>
        ${t.key_hint ? `<div class="tok-hint">${esc(t.key_hint)}</div>` : ''}
        <div class="tok-detail ${cls}">${esc(detail)}</div>
        ${extrasHtml}
        ${checkedAt ? `<div class="tok-checked">${checkedAt}</div>` : ''}
      </div>`;
    }).join('');
  }

  async function refreshTokens(force = false) {
    const btn = $('tok-refresh-btn');
    if (btn) btn.disabled = true;
    try {
      const data = await xhrJson(`/dboard/api/tokens${force ? '?refresh=true' : ''}`);
      renderTokens(data.tokens || []);
    } catch(e) {
      console.error('tokens fetch error', e);
    } finally {
      if (btn) btn.disabled = false;
    }
  }

  // ── Error / XHR ─────────────────────────────────────────────────────────────

  function showError(msg) {
    $('error-text').textContent = msg;
    $('error-banner').style.display = 'flex';
  }
  function hideError() { $('error-banner').style.display = 'none'; }

  async function refresh() {
    let data, sys;
    try {
      [data, sys] = await Promise.all([
        xhrJson('/dboard/api/containers'),
        xhrJson('/dboard/api/system'),
      ]);
    } catch(e) {
      console.error('dboard fetch error', e);
      showError(e.message);
      return;
    }

    hideError();
    if (data.error) { showError(data.error); return; }

    renderSystem(sys);

    rawData.proxied = data.proxied || [];
    rawData.others  = data.others  || [];

    redraw('proxied');
    redraw('others');

    $('lbl-proxied').textContent = `${data.running_proxied} running / ${rawData.proxied.length} total`;
    $('lbl-others').textContent  = `${data.running_others} running / ${rawData.others.length} total`;
    $('summary').textContent     = `${data.running_proxied} proxied running · ${data.running_others} other running`;
    const totalRunning = data.running_proxied + data.running_others;
    const totalAll = rawData.proxied.length + rawData.others.length;
    $('badge-containers').textContent = `${totalRunning} / ${totalAll}`;
    try { $('clock').textContent = new Date(data.updated_at).toLocaleTimeString(); }
    catch(_) { $('clock').textContent = data.updated_at; }
  }

  refresh();
  setInterval(refresh, 5000);

  refreshTokens();
  setInterval(refreshTokens, 30000);
</script>
</body>
</html>
